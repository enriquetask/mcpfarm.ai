services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mcpfarm:mcpfarm_dev@postgres:5432/mcpfarm
      - REDIS_URL=redis://redis:6379/0
      - GATEWAY_LOG_LEVEL=info
      - ADMIN_API_KEY=${ADMIN_API_KEY:-mcpfarm-dev-key}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mcpfarm_public
      - mcpfarm_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_GATEWAY_URL=http://localhost:8000
        - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
        - NEXT_PUBLIC_API_KEY=${ADMIN_API_KEY:-mcpfarm-dev-key}
    ports:
      - "3100:3000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      - gateway
    networks:
      - mcpfarm_public

  echo-server:
    build:
      context: ./servers/echo
    networks:
      - mcpfarm_internal
    labels:
      - "mcpfarm.managed=true"
      - "mcpfarm.namespace=echo"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',9001),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3

  calculator-server:
    build:
      context: ./servers/calculator
    networks:
      - mcpfarm_internal
    labels:
      - "mcpfarm.managed=true"
      - "mcpfarm.namespace=calc"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',9001),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3

  web-search-server:
    build:
      context: ./servers/web_search
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    networks:
      - mcpfarm_internal
    labels:
      - "mcpfarm.managed=true"
      - "mcpfarm.namespace=web"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',9001)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcpfarm
      POSTGRES_PASSWORD: mcpfarm_dev
      POSTGRES_DB: mcpfarm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mcpfarm_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpfarm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - mcpfarm_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.2
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/docker/traefik:/etc/traefik
    networks:
      - mcpfarm_public

volumes:
  pgdata:
  redisdata:

networks:
  mcpfarm_public:
    driver: bridge
  mcpfarm_internal:
    driver: bridge
    internal: true
  mcpfarm_shared:
    external: true
    name: mcpfarm_shared
